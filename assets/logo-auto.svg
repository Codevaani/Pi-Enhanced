<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <style>
    .logo-mark { fill: #000; }
    @media (prefers-color-scheme: dark) {
      .logo-mark { fill: #fff; }
    }
  </style>
  <!--
    Pie logo: a full circle with one slice cut out (evenodd).
    Center: (400, 400), Radius: 300
    Missing slice: 50-degree wedge from center, upper-right.
    Top of circle:           (400,   100)
    50 deg clockwise:        (629.8, 207.2)
  -->
  <path class="logo-mark" fill-rule="evenodd" d="
    M 629.8 207.2
    A 300 300 0 1 1 400 100
    L 400 400
    Z
    M 400 400
    L 400 100
    A 300 300 0 0 1 629.8 207.2
    Z
  "/>
</svg>
