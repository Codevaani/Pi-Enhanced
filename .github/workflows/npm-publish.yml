name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump (patch, minor, major, or explicit x.y.z)'
        required: true
        default: 'patch'
      dry_run:
        description: 'Dry run (no actual publish)'
        type: boolean
        default: false

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Set version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ "$VERSION" =~ ^(major|minor|patch)$ ]]; then
            echo "Bumping version ($VERSION)..."
            npm version "$VERSION" -ws --no-git-tag-version --allow-same-version
            npm version "$VERSION" --no-git-tag-version --allow-same-version
          else
            echo "Setting explicit version ($VERSION)..."
            npm version "$VERSION" -ws --no-git-tag-version --allow-same-version
            npm version "$VERSION" --no-git-tag-version --allow-same-version
          fi
          # Sync workspace dependencies
          node scripts/sync-versions.js
          npm install --package-lock-only --ignore-scripts

      - name: Build
        run: |
          cd packages/tui && npm run build
          cd ../ai && npm run build
          cd ../agent && npm run build
          cd ../coding-agent && npm run build

      - name: Run checks
        run: npm run check

      - name: Publish packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          DRY_RUN="${{ github.event.inputs.dry_run }}"
          if [ "$DRY_RUN" = "true" ]; then
            echo "=== DRY RUN ==="
            node scripts/publish.mjs --dry-run
          else
            node scripts/publish.mjs
          fi

      - name: Commit version bump
        if: github.event.inputs.dry_run != 'true'
        run: |
          RESOLVED_VERSION=$(node -p "require('./package.json').version")
          echo "Resolved version: v$RESOLVED_VERSION"
          git add package.json package-lock.json packages/*/package.json
          if ! git diff --cached --quiet; then
            git commit -m "Release v$RESOLVED_VERSION"
            git push origin main
            git tag "v$RESOLVED_VERSION"
            git push origin "v$RESOLVED_VERSION" || echo "Tag v$RESOLVED_VERSION may already exist."
          fi
