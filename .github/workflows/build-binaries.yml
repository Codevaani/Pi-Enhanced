name: Build Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v0.12.0)'
        required: true
        type: string

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev fd-find ripgrep
          sudo ln -s $(which fdfind) /usr/local/bin/fd

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build packages
        run: npm run build

      - name: Check
        run: npm run check

      - name: Test
        run: ./test.sh

      - name: Build binaries for all platforms
        run: ./scripts/build-binaries.sh

      - name: Create GitHub Release and upload binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd packages/coding-agent/binaries

          release_assets=(
            pie-darwin-arm64.tar.gz
            pie-darwin-x64.tar.gz
            pie-linux-x64.tar.gz
            pie-linux-arm64.tar.gz
            pie-windows-x64.zip
            pie-windows-arm64.zip
          )
          sha256sum "${release_assets[@]}" > SHA256SUMS
          release_assets+=(SHA256SUMS)

          BODY=$(cat <<-EOF
          # pie ${RELEASE_TAG}

          AI coding assistant with read, bash, edit, write tools.

          ## Install

          ### Linux / macOS
          \`\`\`bash
          curl -fsSL https://github.com/Codevaani/Pi-Enhanced/releases/download/${RELEASE_TAG}/install.sh | bash
          \`\`\`

          ### Windows (PowerShell)
          \`\`\`powershell
          iwr -Uri https://github.com/Codevaani/Pi-Enhanced/releases/download/${RELEASE_TAG}/install.ps1 -UseBasicParsing | iex
          \`\`\`

          ### Manual
          Download the archive for your platform from the assets below, extract, and add \`pie\` (or \`pie.exe\` on Windows) to your PATH.
          EOF
          )

          # Copy install scripts alongside binaries for upload
          cp "${GITHUB_WORKSPACE}/scripts/install.sh" .
          cp "${GITHUB_WORKSPACE}/scripts/install.ps1" .
          release_assets+=(install.sh install.ps1)

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "${RELEASE_TAG}" \
              --notes "$BODY" \
              --draft=false \
              --latest
            gh release upload "${RELEASE_TAG}" "${release_assets[@]}" --clobber
          else
            gh release create "${RELEASE_TAG}" \
              --title "${RELEASE_TAG}" \
              --notes "$BODY" \
              --verify-tag \
              --latest \
              "${release_assets[@]}"
          fi
