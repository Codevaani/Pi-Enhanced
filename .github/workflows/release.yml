name: Create Manual Release

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: 'Release version (e.g., 0.0.2, patch, minor, major)'
        required: true
        default: 'patch'

jobs:
  release:
    name: Build & Release Binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js 22.x
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: 'npm'

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2

    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: Install dependencies
      run: npm ci --ignore-scripts

    - name: Set Release Version
      run: |
        VERSION_INPUT="${{ github.event.inputs.release_version }}"
        if [[ "$VERSION_INPUT" =~ ^(major|minor|patch)$ ]]; then
          echo "Bumping version via npm ($VERSION_INPUT)..."
          npm version $VERSION_INPUT -ws --no-git-tag-version
          npm version $VERSION_INPUT --no-git-tag-version
        else
          echo "Setting explicit version ($VERSION_INPUT)..."
          npm version $VERSION_INPUT -ws --no-git-tag-version
          npm version $VERSION_INPUT --no-git-tag-version
        fi
        
        # Sync workspace package.json dependencies
        node scripts/sync-versions.js
        
        # Update lockfile and shrinkwrap
        npm install --package-lock-only --ignore-scripts
        npm run shrinkwrap:coding-agent

    - name: Build Binaries
      run: |
        # Make script executable
        chmod +x scripts/build-binaries.sh
        # Run build script
        ./scripts/build-binaries.sh --skip-install

    - name: Generate Checksums
      run: |
        cd packages/coding-agent/binaries
        sha256sum pie-*.tar.gz pie-*.zip > SHA256SUMS
        cat SHA256SUMS

    - name: Commit and Push Version Bump
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Get resolved version
        RESOLVED_VERSION=$(node -p "require('./package.json').version")
        echo "Resolved version: $RESOLVED_VERSION"
        
        # Commit updated files
        git add package.json package-lock.json packages/*/package.json packages/coding-agent/npm-shrinkwrap.json
        git commit -m "Release v$RESOLVED_VERSION"
        git tag "v$RESOLVED_VERSION"
        
        # Push commit and tag
        git push origin main
        git push origin "v$RESOLVED_VERSION"
        
        # Save resolved version for subsequent release creation step
        echo "NEW_RELEASE_VERSION=v$RESOLVED_VERSION" >> $GITHUB_ENV

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.NEW_RELEASE_VERSION }}
        name: Release ${{ env.NEW_RELEASE_VERSION }}
        draft: false
        prerelease: false
        files: |
          packages/coding-agent/binaries/pie-*.tar.gz
          packages/coding-agent/binaries/pie-*.zip
          packages/coding-agent/binaries/SHA256SUMS
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
